# Production stack — run behind Nginx Proxy Manager (TLS termination).
# Set secrets via .env.prod (never commit). See docs/runbooks/deploy-production.md

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onemore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-onemore}
    volumes:
      - onemore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-onemore} -d ${POSTGRES_DB:-onemore}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-onemore}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-onemore}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - onemore_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${ONEMORE_API_IMAGE:-ghcr.io/kevinlicenji/onemore-api:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-onemore}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-onemore}
      REDIS_URL: redis://redis:6379
      WEB_APP_URL: ${WEB_APP_URL:?WEB_APP_URL required}
      API_PUBLIC_URL: ${API_PUBLIC_URL:?API_PUBLIC_URL required}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?JWT_PRIVATE_KEY required}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY required}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EXPORT_STORAGE_PATH: /data/exports
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - onemore_export_data:/data/exports
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: ${ONEMORE_WEB_IMAGE:-ghcr.io/kevinlicenji/onemore-web:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:?API_PUBLIC_URL required}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    depends_on:
      api:
        condition: service_healthy

volumes:
  onemore_postgres_data:
  onemore_redis_data:
  onemore_export_data:
