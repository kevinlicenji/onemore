openapi: 3.1.0
info:
  title: OneMore API
  version: 0.1.0
  description: OneMore fitness platform REST API v1
servers:
  - url: http://localhost:4000/api/v1
paths:
  /health:
    get:
      summary: Health check (unversioned at /health)
  /auth/register:
    post:
      summary: Register with email and password
  /auth/login:
    post:
      summary: Login with email and password
  /auth/logout:
    post:
      summary: Logout and revoke refresh token
  /auth/refresh:
    post:
      summary: Rotate refresh cookie and get new access token
  /auth/forgot-password:
    post:
      summary: Request password reset email
  /auth/reset-password:
    post:
      summary: Reset password with token
  /users/me:
    get:
      summary: Get current user profile
    patch:
      summary: Update current user profile
