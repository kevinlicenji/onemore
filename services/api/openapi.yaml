openapi: 3.1.0
info:
  title: OneMore API
  version: 0.1.0
  description: OneMore fitness platform REST API v1
servers:
  - url: http://localhost:4000/api/v1
paths:
  /health:
    get:
      summary: Health check (unversioned at /health)
  /auth/register:
    post:
      summary: Register with email and password
  /auth/login:
    post:
      summary: Login with email or username and password
  /auth/logout:
    post:
      summary: Logout and revoke refresh token
  /auth/refresh:
    post:
      summary: Rotate refresh cookie and get new access token
  /auth/forgot-password:
    post:
      summary: Request password reset email
  /auth/reset-password:
    post:
      summary: Reset password with token
  /users/me:
    get:
      summary: Get current user profile
    patch:
      summary: Update current user profile
    delete:
      summary: Request account deletion (30-day soft delete before hard purge)
  /onboarding:
    patch:
      summary: Save partial onboarding wizard progress
  /onboarding/complete:
    post:
      summary: Complete onboarding with all required fields
  /exercises:
    get:
      summary: Search exercise library (tsvector full-text)
    post:
      summary: Create a custom exercise for the current user
  /programs:
    get:
      summary: List programs owned by the current user
    post:
      summary: Create a draft program with days and exercises
  /programs/templates:
    get:
      summary: List system program templates
  /programs/templates/{slug}:
    get:
      summary: Get template detail with days and exercises
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
  /programs/templates/{slug}/apply:
    post:
      summary: Clone a template into the user's library and assign it
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
  /programs/{programId}:
    get:
      summary: Get program detail with days and exercises
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: string
            format: uuid
    put:
      summary: Update program structure and publish a new version
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: string
            format: uuid
    delete:
      summary: Soft-delete a program and pause its assignment
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: string
            format: uuid
  /programs/{programId}/activate:
    post:
      summary: Set program as the user's only active assignment
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: string
            format: uuid
  /programs/{programId}/publish:
    post:
      summary: Publish the latest draft version of a program
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: string
            format: uuid
  /workouts/next:
    get:
      summary: Preview the next programmed workout day
  /workouts/sessions/active:
    get:
      summary: Get the user's in-progress workout session
  /workouts/sessions:
    post:
      summary: Start a programmed or free workout session
  /workouts/sessions/{sessionId}:
    get:
      summary: Get workout session detail with sets
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
  /workouts/sessions/{sessionId}/sets:
    put:
      summary: Upsert a set log for an exercise execution
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
  /workouts/sessions/{sessionId}/exercises:
    post:
      summary: Add an exercise to a free workout session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
  /workouts/sessions/{sessionId}/complete:
    post:
      summary: Complete a workout and advance program rotation
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
  /workouts/sessions/{sessionId}/abandon:
    post:
      summary: Abandon an in-progress workout session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
  /sync/batch:
    post:
      summary: Apply ordered offline mutations (requires Idempotency-Key header)
  /sync/delta:
    get:
      summary: Pull server changes since client watermark
  /history/sessions:
    get:
      summary: List completed workout sessions with pagination and date filters
  /history/sessions/{sessionId}:
    get:
      summary: Get completed session detail with exercises and sets
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
  /analytics/dashboard:
    get:
      summary: Dashboard analytics — streak, weekly consistency, volume, program CTA, monthly stats
  /analytics/personal-records:
    get:
      summary: Personal records for offline dashboard hydration
  /users/me/export:
    post:
      summary: Request GDPR data export (async job, email when ready)
  /users/me/export/latest:
    get:
      summary: Latest export job status for current user
  /users/me/export/{jobId}/download:
    get:
      summary: Download export file with signed token
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
  /notifications/push/vapid-public-key:
    get:
      summary: VAPID public key for Web Push subscription
  /notifications/push/subscribe:
    post:
      summary: Register browser push subscription
  /notifications/push/unsubscribe:
    post:
      summary: Remove push subscription endpoint
  /admin/exercises:
    get:
      summary: List all system exercises (admin)
    post:
      summary: Create a global catalog exercise (admin)
  /admin/exercises/{id}:
    patch:
      summary: Update a global catalog exercise (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
    delete:
      summary: Soft-delete a global catalog exercise (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
  /admin/templates:
    get:
      summary: List catalog templates with version status (admin)
    post:
      summary: Create a draft catalog template (admin)
  /admin/templates/{slug}:
    get:
      summary: Load editable template detail (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
    patch:
      summary: Save template draft changes (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
    delete:
      summary: Soft-delete a catalog template (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
  /admin/templates/{slug}/duplicate:
    post:
      summary: Duplicate a template under a new slug (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
  /admin/templates/{slug}/publish:
    post:
      summary: Publish the latest draft template version (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
  /admin/users/{userId}/admin:
    patch:
      summary: Grant or revoke admin role for a user (admin)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
  /admin/users/by-username/{username}:
    get:
      summary: Find user by username for admin management (admin)
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
