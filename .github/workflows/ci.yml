name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RUN_INTEGRATION_TESTS: 'true'
      DATABASE_URL: postgresql://onemore:onemore_test@localhost:5432/onemore_test
      JWT_PRIVATE_KEY_PATH: services/api/test/fixtures/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: services/api/test/fixtures/jwt-public.pem

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: onemore
          POSTGRES_PASSWORD: onemore_test
          POSTGRES_DB: onemore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onemore -d onemore_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Format check
        run: pnpm format:check

      - name: Generate Prisma client
        run: pnpm --filter @onemore/api exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Apply database migrations
        run: pnpm --filter @onemore/api exec prisma migrate deploy

      - name: Seed exercises and program templates
        run: pnpm --filter @onemore/api seed

      - name: Unit, integration, smoke, and security tests
        run: pnpm test
        env:
          REDIS_URL: redis://localhost:6379

      - name: OpenAPI lint
        run: pnpm --filter @onemore/api openapi:lint

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:4010
          NEXT_PUBLIC_E2E_BYPASS: 'true'
          TURBO_FORCE: 'true'

      - name: Install Playwright browsers
        run: pnpm --filter @onemore/web exec playwright install --with-deps chromium

      - name: E2E and endpoint tests
        run: env -u REDIS_URL pnpm test:e2e
        env:
          CI: 'true'
          DATABASE_URL: postgresql://onemore:onemore_test@localhost:5432/onemore_test
          JWT_PRIVATE_KEY_PATH: services/api/test/fixtures/jwt-private.pem
          JWT_PUBLIC_KEY_PATH: services/api/test/fixtures/jwt-public.pem
